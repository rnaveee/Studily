spring.application.name=Studily

server.port=${PORT:8080}
# Railway terminates TLS and forwards over plain HTTP; trust X-Forwarded-Proto so
# request.isSecure() (and thus HSTS) reflects the original scheme, not the internal hop.
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studily}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

app.jwt.secret=${JWT_SECRET:dev-only-insecure-secret-DO-NOT-USE-IN-PROD-set-JWT_SECRET-env-var}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

app.reminders.window-hours=${REMINDER_WINDOW_HOURS:48}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

app.sentry.dsn=${SENTRY_DSN:}
app.sentry.environment=${SENTRY_ENVIRONMENT:development}
app.sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.2}
