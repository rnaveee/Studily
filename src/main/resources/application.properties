spring.application.name=Studily

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:studily}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
# Allows an existing local DB (pre-Flyway) to be baselined at V1 instead of failing.
# Fresh production databases start at V0 and run all migrations normally.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# --- JWT ---
# MUST override JWT_SECRET in production — must be >= 64 characters.
app.jwt.secret=${JWT_SECRET:dev-only-insecure-secret-DO-NOT-USE-IN-PROD-set-JWT_SECRET-env-var}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- CORS ---
# Set CORS_ORIGINS to your production frontend URL (comma-separated if multiple).
# Example: CORS_ORIGINS=https://studily.vercel.app
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# --- Reminders ---
app.reminders.window-hours=${REMINDER_WINDOW_HOURS:48}
