spring.application.name=Studily

# --- Datasource (local PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:studily}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# --- JPA ---
# Dev convenience. TODO: switch to validate + Flyway migrations before any real deploy.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- JWT ---
# Override app.jwt.secret in prod (env JWT_SECRET). Must be >= 32 bytes for HS256.
app.jwt.secret=${JWT_SECRET:dev-only-change-me-please-32-bytes-minimum-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- CORS (frontend dev server) ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# --- Reminders ---
# How far ahead (hours) to surface upcoming-deadline notifications.
app.reminders.window-hours=${REMINDER_WINDOW_HOURS:48}
