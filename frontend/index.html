<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studily</title>
    <link rel="icon" type="image/svg+xml" href="/studily-3a.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/studily-3a-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/studily-3a-180.png" />
    <script>
      (function () {
        const stored = localStorage.getItem("studily.theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (stored === "dark" || (!stored && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
